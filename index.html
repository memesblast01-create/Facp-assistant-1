<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACP ASSISTANT</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:url('background.jpg') center/cover fixed;
    color:white;
}
.overlay {
    background:rgba(0,0,0,0.7);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
}
.box {
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    width:100%;
    max-width:400px;
}
input,button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}
button {
    background:#25D366;
    color:white;
    font-weight:bold;
}
.card {
    background:white;
    color:black;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}
.admin-link {
    margin-top:10px;
    font-size:12px;
    color:#aaa;
    cursor:pointer;
}
</style>
</head>

<body>
<div class="overlay">

<div class="box">
<h2>FACP ASSISTANT</h2>

<input id="search" placeholder="Search code or name">
<button onclick="searchData()">Search</button>

<div class="admin-link" onclick="goAdmin()">Admin Panel</div>
</div>

<div id="results" style="width:100%;max-width:400px;"></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];

async function loadData() {
    const snap = await db.collection("buildings").get();
    data = snap.docs.map(d => d.data());
}
loadData();

function searchData() {
    const q = document.getElementById("search").value.toLowerCase();
    const results = data.filter(d =>
        (d.Building_Code||"").toLowerCase().includes(q) ||
        (d.Building_Name||"").toLowerCase().includes(q)
    );

    const area = document.getElementById("results");
    area.innerHTML = "";

    if(results.length === 0){
        area.innerHTML = "<p>No result</p>";
        return;
    }

    results.forEach(r=>{
        area.innerHTML += `
        <div class="card">
        <b>${r.Building_Name}</b><br>
        Code: ${r.Building_Code}<br>
        Zone: ${r.Zone_or_Details || "-"}
        </div>`;
    });
}

function goAdmin(){
    window.location.href = "admin.html";
}
</script>
</body>
</html>
