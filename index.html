<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACP SEARCH</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
input, button { padding:12px; width:100%; margin:10px 0; }
.card { background:#222; padding:10px; margin:10px 0; }
</style>
</head>

<body>

<h2>SEARCH BUILDING</h2>
<input id="searchBox" placeholder="Search code, name, zone">
<button onclick="search()">SEARCH</button>

<div id="results"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];

async function load() {
  const snap = await db.collection("buildings").get();
  data = snap.docs.map(d => d.data());
}
load();

function search() {
  const q = document.getElementById("searchBox").value.toUpperCase();

  const res = data.filter(i =>
    Object.values(i).some(v =>
      (v || "").toString().toUpperCase().includes(q)
    )
  );

  document.getElementById("results").innerHTML =
    res.map(r =>
      `<div class="card">
        <b>${r.Building_Code || "-"}</b><br>
        ${r.Building_Name || "-"}<br>
        ${r.Zone_or_Details || "-"}
      </div>`
    ).join("");
}
</script>

</body>
</html>
