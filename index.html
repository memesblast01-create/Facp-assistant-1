<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACP ASSISTANT</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

input, textarea {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #25D366;
    color: white;
    cursor: pointer;
}

#results {
    margin-top: 20px;
}

.card {
    background: white;
    color: black;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
}

#adminPanel {
    display: none;
    background: #222;
    padding: 15px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h2>FACP ASSISTANT</h2>

    <input id="searchInput" placeholder="Search Code or Name">
    <button onclick="searchData()">Search</button>

    <br><br>
    <button onclick="toggleAdmin()">Admin Panel</button>

    <div id="adminPanel">
        <input id="email" placeholder="Admin Email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>

        <div id="adminControls" style="display:none;">
            <p>Upload CSV (Code,Name,Zone)</p>
            <textarea id="csvData" placeholder="3089,Building A,Zone 1"></textarea>
            <button onclick="uploadCSV()">Upload</button>
            <button onclick="logout()" style="background:red;">Logout</button>
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let allData = [];

async function loadData() {
    const snapshot = await db.collection("buildings").get();
    allData = snapshot.docs.map(doc => doc.data());
    console.log("Loaded:", allData.length);
}

loadData();

function searchData() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    const results = allData.filter(item =>
        (item.code || "").toLowerCase().includes(q) ||
        (item.name || "").toLowerCase().includes(q)
    );

    const div = document.getElementById("results");
    div.innerHTML = "";

    if(results.length === 0){
        div.innerHTML = "No results found";
        return;
    }

    results.forEach(r => {
        div.innerHTML += `
        <div class="card">
            <b>Code:</b> ${r.code || "-"}<br>
            <b>Name:</b> ${r.name}<br>
            <b>Zone:</b> ${r.zone || "-"}
        </div>`;
    });
}

function toggleAdmin(){
    const panel = document.getElementById("adminPanel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
}

async function login(){
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    try {
        await auth.signInWithEmailAndPassword(email, pass);
        document.getElementById("adminControls").style.display = "block";
    } catch(e){
        alert(e.message);
    }
}

async function logout(){
    await auth.signOut();
    location.reload();
}

async function uploadCSV(){
    const text = document.getElementById("csvData").value;
    const lines = text.split("\n");

    const batch = db.batch();

    lines.forEach(line => {
        const [code, name, zone] = line.split(",");
        if(name){
            const ref = db.collection("buildings").doc();
            batch.set(ref, {
                code: code?.trim(),
                name: name?.trim(),
                zone: zone?.trim()
            });
        }
    });

    await batch.commit();
    alert("Uploaded successfully");

    loadData();
}
</script>

</body>
</html>
