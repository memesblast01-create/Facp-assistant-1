<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACP Assistant - Building Search System</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url("background.jpg");
  background-size: cover;
  background-attachment: fixed;
  background-position: center;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
.main-container {
  width: 100%;
  max-width: 700px;
  backdrop-filter: blur(15px);
  background: rgba(0, 0, 0, 0.8);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.1);
}
.header { text-align: center; margin-bottom: 30px; }
.header h1 {
  font-size: 2.5em;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #25D366, #128C7E);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header p { color: #aaa; font-size: 0.95em; }
.search-container { display: flex; gap: 10px; margin-bottom: 20px; }
.search-container input {
  flex: 1;
  padding: 15px;
  border: none;
  border-radius: 10px;
  font-size: 1em;
  background: white;
  color: #333;
}
.search-container button {
  padding: 15px 30px;
  background: #25D366;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}
.admin-btn {
  display: block;
  margin: 20px auto 0;
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.1);
  color: #aaa;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  cursor: pointer;
}
.results-container { margin-top: 30px; max-height: 500px; overflow-y: auto; }
.result-card {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(37, 211, 102, 0.3);
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 12px;
  transition: transform 0.2s;
}
.result-card:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.08); }
.field-row { margin-bottom: 5px; display: flex; flex-wrap: wrap; }
.field-label { color: #25D366; font-weight: bold; margin-right: 10px; min-width: 120px; }
.field-value { color: #fff; flex: 1; }
.no-results { text-align: center; color: #aaa; padding: 20px; }
.status-badge {
  font-size: 0.7em;
  padding: 4px 10px;
  border-radius: 20px;
  margin-left: 10px;
  vertical-align: middle;
  font-weight: bold;
}
.status-online { background: #25D366; color: black; }
.status-offline { background: #ff9800; color: white; }
</style>
</head>
<body>

<div class="main-container">
  <div class="header">
    <h1>🏢 FACP Assistant <span id="statusBadge" class="status-badge status-offline">Local Mode</span></h1>
    <p>Building Search System</p>
  </div>

  <div class="search-container">
    <input id="searchInput" type="text" placeholder="Search by code, name, or any detail...">
    <button onclick="performSearch()">SEARCH</button>
  </div>

  <button class="admin-btn" onclick="location.href='admin.html'">Admin Panel</button>

  <div class="results-container" id="resultsContainer">
    <div class="no-results">Type something to search...</div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

let buildingsData = [];

// Initialize
window.onload = async () => {
  // 1. Load from Local Storage first (Immediate)
  const localData = JSON.parse(localStorage.getItem("facp_data") || "[]");
  buildingsData = localData;
  updateStatus();

  // 2. Try to load from Firebase (Sync)
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const snap = await db.collection("buildings").get();
    const fireData = [];
    snap.forEach(doc => fireData.push(doc.data()));
    
    if (fireData.length > 0) {
      // Merge and deduplicate if necessary, or just use Firebase as source of truth
      buildingsData = fireData;
      document.getElementById("statusBadge").textContent = "Cloud Synced";
      document.getElementById("statusBadge").className = "status-badge status-online";
    }
  } catch (e) {
    console.log("Firebase sync failed, using local data.");
  }

  if (buildingsData.length === 0) {
    document.getElementById("resultsContainer").innerHTML = '<div class="no-results">No data found. Go to Admin to upload.</div>';
  }
};

function updateStatus() {
  const badge = document.getElementById("statusBadge");
  if (buildingsData.length > 0) {
    badge.textContent = "Data Ready (" + buildingsData.length + ")";
  }
}

function performSearch() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const container = document.getElementById("resultsContainer");
  
  if (!q) {
    container.innerHTML = '<div class="no-results">Type something to search...</div>';
    return;
  }

  const results = buildingsData.filter(item => 
    Object.values(item).some(val => String(val || "").toLowerCase().includes(q))
  );

  if (results.length === 0) {
    container.innerHTML = '<div class="no-results">No results found for "' + q + '"</div>';
    return;
  }

  container.innerHTML = results.map(item => {
    // Dynamically build rows for all available fields to avoid N/A
    let fieldsHtml = "";
    Object.entries(item).forEach(([key, value]) => {
      if (value && String(value).trim() !== "") {
        // Clean up key names (e.g., Building_Code -> Building Code)
        const label = key.replace(/_/g, ' ');
        fieldsHtml += `
          <div class="field-row">
            <span class="field-label">${label}:</span>
            <span class="field-value">${value}</span>
          </div>
        `;
      }
    });
    return `<div class="result-card">${fieldsHtml}</div>`;
  }).join("");
}

document.getElementById("searchInput").onkeypress = (e) => { if(e.key === "Enter") performSearch(); };
</script>
</body>
</html>
