<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>FACP ASSISTANT</title><script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script><style>
body{font-family:Arial;background:#111;color:white;text-align:center}
input{padding:10px;width:80%}
button{padding:10px;margin:10px;background:#25D366;color:white;border:none}
.card{background:white;color:black;margin:10px;padding:10px;border-radius:8px}
</style></head><body><h2>FACP ASSISTANT</h2><input id="q" placeholder="Search code or name">
<br>
<button onclick="search()">Search</button><br>
<button onclick="location.href='admin.html'">Admin Panel</button><div id="results"></div><script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];

async function load(){
    data = [];
    const snap = await db.collection("buildings").get();

    snap.forEach(doc=>{
        const d = doc.data();

        data.push({
            id: doc.id,
            code: d.code || d.Building_Code || "",
            name: d.name || d.Building_Name || "",
            zone: d.zone || d.Zone_or_Details || ""
        });
    });

    console.log("Loaded:", data.length);
}
load();

function search(){
    const q = document.getElementById("q").value.toLowerCase();

    const res = data.filter(i =>
        i.code.toLowerCase().includes(q) ||
        i.name.toLowerCase().includes(q)
    );

    const div = document.getElementById("results");
    div.innerHTML="";

    if(!res.length){
        div.innerHTML="No results";
        return;
    }

    res.forEach(r=>{
        div.innerHTML+=`
        <div class="card">
        <b>${r.name}</b><br>
        Code: ${r.code}<br>
        Zone: ${r.zone}
        </div>`;
    });
}
</script></body>
</html>
