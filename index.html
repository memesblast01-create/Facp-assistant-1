<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACP SEARCH</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:url('background.jpg') center/cover fixed;
color:white;
}
.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}
.box{
width:100%;
max-width:400px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:12px;
}
input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}
button{background:#25D366;color:white;}
.card{
background:white;
color:black;
margin-top:10px;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>
<div class="overlay">

<div class="box">
<h2>FACP SEARCH</h2>

<input id="q" placeholder="Search anything">
<button onclick="search()">Search</button>
<button onclick="location.href='admin.html'">Admin Panel</button>
</div>

<div id="results" style="width:100%;max-width:400px;"></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];

async function load(){
 const snap = await db.collection("buildings").get();
 data = snap.docs.map(d=>d.data());
}
load();

function search(){
 const q = document.getElementById("q").value.toLowerCase();

 const res = data.filter(d =>
 JSON.stringify(d).toLowerCase().includes(q)
 );

 const out = document.getElementById("results");
 out.innerHTML = "";

 if(res.length===0){
 out.innerHTML="No result";
 return;
 }

 res.forEach(r=>{
 out.innerHTML += `<div class="card">${r.raw || JSON.stringify(r)}</div>`;
 });
}
</script>

</body>
</html>
