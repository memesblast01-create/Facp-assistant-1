<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACP Assistant - Building Search System</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url("background.jpg");
  background-size: cover;
  background-attachment: fixed;
  background-position: center;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
.main-container {
  width: 100%;
  max-width: 700px;
  backdrop-filter: blur(15px);
  background: rgba(0, 0, 0, 0.85);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.1);
}
.header { text-align: center; margin-bottom: 30px; }
.header h1 {
  font-size: 2.5em;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #25D366, #128C7E);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header p { color: #aaa; font-size: 0.95em; }
.search-container { display: flex; gap: 10px; margin-bottom: 20px; }
.search-container input {
  flex: 1;
  padding: 15px;
  border: none;
  border-radius: 10px;
  font-size: 1.1em;
  background: white;
  color: #333;
}
.search-container button {
  padding: 15px 30px;
  background: #25D366;
  color: black;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  font-size: 1em;
}
.admin-btn {
  display: block;
  margin: 20px auto 0;
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.05);
  color: #aaa;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9em;
}
.results-container { margin-top: 30px; max-height: 500px; overflow-y: auto; padding-right: 5px; }
.result-card {
  background: rgba(255, 255, 255, 0.03);
  border-left: 5px solid #25D366;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.code-line {
  font-size: 1.3em;
  font-weight: 900;
  color: #25D366;
  margin-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 5px;
}
.detail-row { margin-bottom: 6px; font-size: 1.05em; }
.detail-label { color: #aaa; font-weight: 500; margin-right: 8px; }
.detail-value { color: #fff; font-weight: 700; }
.no-results { text-align: center; color: #aaa; padding: 20px; }
.status-badge {
  font-size: 0.7em;
  padding: 4px 10px;
  border-radius: 20px;
  margin-left: 10px;
  vertical-align: middle;
  font-weight: bold;
}
.status-online { background: #25D366; color: black; }
/* Scrollbar */
.results-container::-webkit-scrollbar { width: 6px; }
.results-container::-webkit-scrollbar-thumb { background: #25D366; border-radius: 10px; }
</style>
</head>
<body>

<div class="main-container">
  <div class="header">
    <h1>🏢 FACP Assistant <span id="statusBadge" class="status-badge status-online">Ready</span></h1>
    <p>Building Search System</p>
  </div>

  <div class="search-container">
    <input id="searchInput" type="text" placeholder="Search code, name, or area...">
    <button onclick="performSearch()">SEARCH</button>
  </div>

  <button class="admin-btn" onclick="location.href='admin.html'">Admin Panel</button>

  <div class="results-container" id="resultsContainer">
    <div class="no-results">Type something to search...</div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

let buildingsData = [];

window.onload = async () => {
  // Load local first
  buildingsData = JSON.parse(localStorage.getItem("facp_data") || "[]");
  
  // Sync with Firebase
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const snap = await db.collection("buildings").get();
    const fireData = [];
    snap.forEach(doc => fireData.push(doc.data()));
    if (fireData.length > 0) {
      buildingsData = fireData;
      localStorage.setItem("facp_data", JSON.stringify(fireData));
    }
  } catch (e) { console.log("Offline mode"); }
};

function performSearch() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const container = document.getElementById("resultsContainer");
  
  if (!q) {
    container.innerHTML = '<div class="no-results">Type something to search...</div>';
    return;
  }

  const results = buildingsData.filter(item => 
    Object.values(item).some(val => String(val || "").toLowerCase().includes(q))
  );

  if (results.length === 0) {
    container.innerHTML = '<div class="no-results">No results found for "' + q + '"</div>';
    return;
  }

  container.innerHTML = results.map(item => {
    // Identify Code field (usually first or contains 'Code')
    let codeKey = Object.keys(item).find(k => k.toLowerCase().includes('code')) || Object.keys(item)[0];
    let codeValue = item[codeKey] || "N/A";

    let detailsHtml = "";
    Object.entries(item).forEach(([key, value]) => {
      // STRICT FILTERING:
      // 1. Skip the code (already at top)
      // 2. Skip internal IDs or fields containing 'id'
      // 3. Skip timestamps or fields containing 'created', 'updated', 'time', 'date'
      // 4. Skip values that are purely long numbers (like 1776408383639)
      const lowKey = key.toLowerCase();
      const isInternal = lowKey.includes('id') || lowKey.includes('created') || lowKey.includes('updated') || lowKey.includes('time') || lowKey.includes('date');
      const isTimestamp = /^\d{10,15}$/.test(String(value)); // Matches 10-15 digit numbers
      
      if (key === codeKey || isInternal || isTimestamp || !value || String(value).trim() === "") return;
      
      const label = key.replace(/_/g, ' ');
      detailsHtml += `
        <div class="detail-row">
          <span class="detail-label">${label}:</span>
          <span class="detail-value">${value}</span>
        </div>
      `;
    });

    return `
      <div class="result-card">
        <div class="code-line">${codeValue}</div>
        ${detailsHtml}
      </div>
    `;
  }).join("");
}

document.getElementById("searchInput").onkeypress = (e) => { if(e.key === "Enter") performSearch(); };
</script>
</body>
</html>
