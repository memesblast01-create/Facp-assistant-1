<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACP Assistant - Building Search System</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url("background.jpg");
  background-size: cover;
  background-attachment: fixed;
  background-position: center;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
.main-container {
  width: 100%;
  max-width: 700px;
  backdrop-filter: blur(15px);
  background: rgba(0, 0, 0, 0.75);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.1);
}
.header { text-align: center; margin-bottom: 30px; }
.header h1 {
  font-size: 2.5em;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #25D366, #128C7E);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header p { color: #aaa; font-size: 0.95em; }
.search-container { display: flex; gap: 10px; margin-bottom: 20px; }
.search-container input {
  flex: 1;
  padding: 15px;
  border: none;
  border-radius: 10px;
  font-size: 1em;
  background: white;
  color: #333;
}
.search-container button {
  padding: 15px 30px;
  background: #25D366;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}
.admin-btn {
  display: block;
  margin: 20px auto 0;
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.1);
  color: #aaa;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  cursor: pointer;
}
.results-container { margin-top: 30px; max-height: 500px; overflow-y: auto; }
.result-card {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(37, 211, 102, 0.3);
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 10px;
}
.result-card-code { font-weight: bold; color: #25D366; font-size: 1.1em; }
.no-results { text-align: center; color: #aaa; padding: 20px; }
.status-badge {
  font-size: 0.7em;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 10px;
  vertical-align: middle;
}
.status-online { background: #25D366; color: black; }
.status-offline { background: #ff4336; color: white; }
</style>
</head>
<body>

<div class="main-container">
  <div class="header">
    <h1>🏢 FACP Assistant <span id="statusBadge" class="status-badge status-offline">Manus Mode</span></h1>
    <p>Building Search System</p>
  </div>

  <div class="search-container">
    <input id="searchInput" type="text" placeholder="Search anything (code, name, zone)...">
    <button onclick="performSearch()">SEARCH</button>
  </div>

  <button class="admin-btn" onclick="location.href='admin.html'">Admin Panel</button>

  <div class="results-container" id="resultsContainer">
    <div class="no-results">Type something to search...</div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

let db = null;
let buildingsData = [];

// Initialize
window.onload = async () => {
  // Try Firebase
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    const snap = await db.collection("buildings").get();
    snap.forEach(doc => buildingsData.push(doc.data()));
    if (buildingsData.length > 0) {
      document.getElementById("statusBadge").textContent = "Firebase Online";
      document.getElementById("statusBadge").className = "status-badge status-online";
    }
  } catch (e) {
    console.log("Firebase not connected, using Local Storage");
  }

  // Always merge with Local Storage data
  const localData = JSON.parse(localStorage.getItem("facp_data") || "[]");
  buildingsData = [...buildingsData, ...localData];

  // If still empty, add sample
  if (buildingsData.length === 0) {
    buildingsData = [
      { Building_Code: "S001", Building_Name: "Sample Building", Zone_or_Details: "Manus Mode Active" }
    ];
  }
};

function performSearch() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const container = document.getElementById("resultsContainer");
  
  if (!q) {
    container.innerHTML = '<div class="no-results">Type something to search...</div>';
    return;
  }

  const results = buildingsData.filter(item => 
    Object.values(item).some(val => String(val).toLowerCase().includes(q))
  );

  if (results.length === 0) {
    container.innerHTML = '<div class="no-results">No results found for "' + q + '"</div>';
    return;
  }

  container.innerHTML = results.map(item => `
    <div class="result-card">
      <div class="result-card-code">${item.Building_Code || 'N/A'}</div>
      <div>${item.Building_Name || 'N/A'}</div>
      <div style="color:#aaa; font-size:0.9em">${item.Zone_or_Details || 'N/A'}</div>
    </div>
  `).join("");
}

// Enter key support
document.getElementById("searchInput").onkeypress = (e) => { if(e.key === "Enter") performSearch(); };
</script>
</body>
</html>
