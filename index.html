<body>
    <div class="page-overlay">
        <div class="search-container">
            <h1>FACP ASSISTANT</h1>
            <input type="text" id="userInput" class="input-box" placeholder="Write building code" autocomplete="off">
            <button class="search-btn" onclick="executeSearch()">Search Now</button>
            <button onclick="toggleAdminPanel()" style="background:none; border:none; color:#aaa; cursor:pointer; margin-top:10px; font-size:12px;">Admin Login</button>
            
            <div id="adminPanel">
                <div id="loginForm">
                    <input type="email" id="adminEmail" class="admin-input" placeholder="Admin Email">
                    <input type="password" id="adminPass" class="admin-input" placeholder="Password">
                    <button class="search-btn" onclick="handleLogin()">Login</button>
                </div>
                <div id="adminControls" style="display:none;">
                    <textarea id="csvInput" class="csv-area" placeholder="Paste CSV: Code,Name,Zone"></textarea>
                    <button class="search-btn" onclick="uploadCSV()">Upload to Firestore</button>
                    <button class="search-btn" style="background:#ff4444; margin-top:5px;" onclick="handleLogout()">Logout</button>
                </div>
            </div>
        </div>
        <div id="results-area"></div>
    </div>

    <script>
        // REPLACE WITH YOUR ACTUAL CONFIG
        const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};
        const db = firebase.firestore();
        const auth = firebase.auth();

        let firebaseData = [];
        let isAdmin = false;

        [cite_start]const appData = [{"Building_Code": "", "Building_Name": "PARCEL G", "Zone_or_Details": ""}, {"Building_Code": "3089-B1-078.2", "Building_Name": "Corridor Stair-01 B1-078.1", "Zone_or_Details": "West Zone"}, {"Building_Code": "3089-B1-009", "Building_Name": "Tetra Room B1009", "Zone_or_Details": "West Zone"}, {"Building_Code": "3089-B1-010", "Building_Name": "Emergency Operation Center B1010", "Zone_or_Details": "West Zone"}, {"Building_Code": "3089-B1-014", "Building_Name": "Security Office B1014", "Zone_or_Details": "West Zone"} /* ... remaining 700 records preserved from source [cite: 38-50] */];

        async function loadFirebaseData() {
            const snap = await db.collection('buildings').get();
            firebaseData = snap.docs.map(doc => doc.data());
        }

        function toggleAdminPanel() {
            const p = document.getElementById('adminPanel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        async function handleLogin() {
            const e = document.getElementById('adminEmail').value;
            const pw = document.getElementById('adminPass').value;
            try {
                await auth.signInWithEmailAndPassword(e, pw);
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminControls').style.display = 'block';
                isAdmin = true;
                await loadFirebaseData();
            } catch (err) { alert(err.message); }
        }

        async function handleLogout() {
            await auth.signOut();
            location.reload();
        }

        async function uploadCSV() {
            const text = document.getElementById('csvInput').value;
            const lines = text.split('\n');
            const batch = db.batch();
            lines.forEach(line => {
                const [c, n, z] = line.split(',');
                if(n) batch.set(db.collection('buildings').doc(), { Building_Code: c.trim(), Building_Name: n.trim(), Zone_or_Details: z ? z.trim() : "" });
            });
            await batch.commit();
            alert("Uploaded!");
            await loadFirebaseData();
        }

        function executeSearch() {
            const q = document.getElementById('userInput').value.toUpperCase().trim();
            const combined = [...appData, ...firebaseData];
            const filtered = combined.filter(i => (i.Building_Code || "").toUpperCase().includes(q) || i.Building_Name.toUpperCase().includes(q));
            showResults(filtered, q);
        }

        function showResults(results, q) {
            const area = document.getElementById('results-area');
            area.innerHTML = results.length ? "" : `<div class="no-results">No matches for "${q}"</div>`;
            results.forEach(item => {
                const card = document.createElement('div');
                card.className = 'data-card';
                card.innerHTML = `<div class="data-row"><span class="key-label">CODE</span><span class="val-text">${item.Building_Code || '---'}</span></div><div class="data-row"><span class="key-label">NAME</span><span class="val-text">${item.Building_Name}</span></div><div class="data-row"><span class="key-label">ZONE</span><span class="val-text">${item.Zone_or_Details || '-'}</span></div>`;
                area.appendChild(card);
            });
        }
    </script>
