<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACP SEARCH</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background-image:url("background.jpg");
  background-size:cover;
}

.container{
  width:90%;
  max-width:600px;
  backdrop-filter: blur(12px);
  background: rgba(0,0,0,0.6);
  padding:20px;
  border-radius:15px;
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#25D366;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:white;
  color:black;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>FACP SEARCH SYSTEM</h2>

  <input id="q" placeholder="Search anything...">
  <button onclick="search()">SEARCH</button>

  <div id="res"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];

db.collection("buildings").get().then(snap=>{
  snap.forEach(d=>data.push(d.data()));
});

function search(){
  let q = qBox();

  let out = data.filter(item =>
    Object.values(item).some(v =>
      (v+"").toLowerCase().includes(q)
    )
  );

  document.getElementById("res").innerHTML =
    out.map(x=>`
      <div class="card">
        <b>${x.Building_Code||""}</b><br>
        ${x.Building_Name||""}<br>
        ${x.Zone_or_Details||""}
      </div>
    `).join("");
}

function qBox(){
  return document.getElementById("q").value.toLowerCase();
}
</script>

</body>
</html>
