<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Create Patrolling Reports</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--g:#25D366;--gd:rgba(37,211,102,0.12);--gb:rgba(37,211,102,0.35);--d:#0a0a0a;--d2:#111;--d3:#1a1a1a;--t:#e0e0e0;--m:#666}

body{
  font-family:'Rajdhani',sans-serif;
  background-color:var(--d);
  background-image:
    linear-gradient(rgba(10,10,10,0.93),rgba(10,10,10,0.93)),
    url("https://uaelogos.ae/storage/4242/conversions/Expo-City-Dubai-thumb.png");
  background-repeat:no-repeat;
  background-position:center 46vh;
  background-size:min(70vw,420px);
  background-attachment:fixed;
  color:var(--t);
  min-height:100vh;
  padding-bottom:90px;
}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--gb);background:rgba(17,17,17,0.9);backdrop-filter:blur(6px);position:sticky;top:0;z-index:99}
.hdr h1{font-size:1.15em;color:var(--g);letter-spacing:2px;text-transform:uppercase;font-weight:700}
.badge{background:var(--gd);border:1px solid var(--gb);border-radius:20px;padding:4px 10px;font-size:0.68em;color:var(--g);letter-spacing:1px;font-family:'Share Tech Mono',monospace}

.wrap{padding:16px;max-width:720px;margin:0 auto}

.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:12px;border:1px solid var(--gb);border-radius:10px;background:var(--d3);color:var(--m);text-align:center;font-weight:700;letter-spacing:1px;font-size:0.85em;cursor:pointer;text-transform:uppercase;transition:all .15s}
.tab.on{background:var(--g);color:#000;border-color:var(--g)}

.card{background:var(--d2);border:1px solid var(--gb);border-radius:14px;overflow:hidden;margin-bottom:16px}
.ch{padding:11px 16px;background:var(--gd);border-bottom:1px solid var(--gb);display:flex;align-items:center;justify-content:space-between}
.ch span{color:var(--g);font-size:.82em;letter-spacing:2px;text-transform:uppercase;font-weight:600}
.cb{padding:14px 16px}

textarea{
  width:100%;min-height:220px;background:var(--d3);color:var(--t);border:1px solid var(--gb);
  border-radius:10px;padding:12px;font-family:'Share Tech Mono',monospace;font-size:0.85em;line-height:1.6;resize:vertical;outline:none;
}
textarea::placeholder{color:var(--m)}
textarea:focus{border-color:var(--g)}

.hint{font-size:.7em;color:var(--m);letter-spacing:1px;margin-top:8px;line-height:1.7}

.btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:1em;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;transition:opacity .15s}
.bg{background:var(--g);color:#000}.bg:active{opacity:.75}.bg:disabled{opacity:.3;cursor:not-allowed}
.bo{background:var(--d3);color:var(--g);border:1px solid var(--gb)}.bo:active{background:var(--gd)}

#proc{display:none;padding:26px 20px;text-align:center}
.ring{width:48px;height:48px;border:3px solid var(--gd);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
#procMsg{color:var(--g);font-family:'Share Tech Mono',monospace;font-size:.82em;letter-spacing:2px}

#outCard{display:none}
#outBox{
  background:var(--d3);border:1px solid var(--gb);border-radius:10px;padding:16px;
  font-family:'Share Tech Mono',monospace;font-size:0.82em;line-height:1.75;white-space:pre-wrap;word-break:break-word;color:#fff;max-height:60vh;overflow-y:auto;
}
.copied-flag{display:none;background:var(--g);color:#000;text-align:center;padding:8px;border-radius:8px;font-size:.78em;font-weight:700;letter-spacing:1px;margin-top:10px}

.errmsg{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.25);border-radius:10px;padding:14px;color:#f66;font-size:.82em;letter-spacing:1px;line-height:1.8;font-family:'Share Tech Mono',monospace}

.footer{position:fixed;bottom:0;left:0;width:100%;padding:10px;display:flex;justify-content:center;z-index:100;pointer-events:none;background:linear-gradient(transparent,var(--d) 60%)}
.fi{background:rgba(15,15,15,.97);backdrop-filter:blur(12px);padding:9px 18px;border-radius:20px;border:1px solid var(--gb);display:flex;align-items:center;gap:12px;pointer-events:auto}
.fi p{margin:0;font-size:.76em;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:2px}
.bk{background:none;border:1px solid var(--gb);color:var(--g);border-radius:8px;padding:5px 12px;font-size:.74em;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px}
</style>
</head>
<body>

<div class="hdr">
  <h1><i class="fas fa-clipboard-list" style="margin-right:8px;font-size:.85em"></i>Create Patrolling Reports</h1>
  <div class="badge"><i class="fas fa-robot"></i> GEMINI AI</div>
</div>

<div class="wrap">

  <div class="tabs">
    <div class="tab on" id="tabSecurity" onclick="setMode('security')"><i class="fas fa-shield-halved"></i> Security Patrol</div>
    <div class="tab" id="tabContractor" onclick="setMode('contractor')"><i class="fas fa-truck"></i> Contractor Activity</div>
  </div>

  <div class="card">
    <div class="ch"><span id="inputTitle"><i class="fas fa-pen" style="margin-right:8px"></i>Paste Raw Report</span></div>
    <div class="cb">
      <textarea id="rawInput" placeholder="Paste the raw patrol notes here exactly as received..."></textarea>
      <div class="hint" id="modeHint"></div>
      <button class="btn bg" id="genBtn" onclick="generateReport()"><i class="fas fa-wand-magic-sparkles"></i> Generate Clean Report</button>
    </div>
  </div>

  <div class="card" id="proc" style="display:none">
    <div class="cb" style="text-align:center">
      <div class="ring"></div>
      <div id="procMsg">SENDING TO GEMINI AI...</div>
    </div>
  </div>

  <div class="card" id="outCard">
    <div class="ch">
      <span><i class="fas fa-check-circle" style="margin-right:8px"></i>Clean Report</span>
      <button class="bk" onclick="resetAll()">Clear</button>
    </div>
    <div class="cb">
      <div id="outBox"></div>
      <button class="btn bg" id="copyBtn" onclick="copyReport()"><i class="fas fa-copy"></i> Copy Report</button>
      <div class="copied-flag" id="copiedFlag"><i class="fas fa-check"></i> Copied to clipboard</div>
    </div>
  </div>

</div>

<div class="footer">
  <div class="fi">
    <button class="bk" onclick="location.href='index.html'"><i class="fas fa-arrow-left"></i> Back</button>
    <p>Patrol Report Builder</p>
  </div>
</div>

<script>
// ── CONFIG — reuses the same Cloudflare Worker as the FACP Scanner ──
const WORKER_URL = "https://facpscanner.memesblast01.workers.dev/";

let mode = 'security';
let lastReportText = '';

const HINTS = {
  security: "Paste the raw security patrol notes (date, start/end time, location, description, activity, findings, remarks, call sign) in whatever rough format you received them.",
  contractor: "Paste the raw contractor / material collection activity notes (date, location, subject, description, in-charge details, driver details) in whatever rough format you received them."
};

function setMode(m){
  mode = m;
  document.getElementById('tabSecurity').classList.toggle('on', m==='security');
  document.getElementById('tabContractor').classList.toggle('on', m==='contractor');
  document.getElementById('modeHint').textContent = HINTS[m];
  document.getElementById('inputTitle').innerHTML = m === 'security'
    ? '<i class="fas fa-pen" style="margin-right:8px"></i>Paste Raw Security Patrol Notes'
    : '<i class="fas fa-pen" style="margin-right:8px"></i>Paste Raw Contractor Activity Notes';
}
setMode('security');

// ── PROMPTS ──────────────────────────────────────────────────────────
// Each prompt teaches Gemini the exact target format via one worked example,
// then asks it to reformat the newly pasted raw text the same way.

function buildSecurityPrompt(raw){
  return `You are formatting Expo City Security patrol reports. You will be given a rough, informal raw patrol note (often written on WhatsApp with inconsistent bold markers like "**Date:*"). Rewrite it into a clean, consistent report using EXACTLY the structure and labels below. Fix typos, spelling, and grammar. Keep every factual detail, ticket/reference number (SR-, TN-, TK- codes) and name/contact exactly as given — never invent or drop information. Do not add commentary. Output plain text only, no markdown symbols like ** or #, no HTML.

TARGET FORMAT:
Date: <date>
Security Call Sign: <call sign>
Patrol Type: <patrol type>
Start Time: <start time>
Location: <exact location>

Description of Activity / Finding(s):
Description -
<clean prose paragraph merging the "description of area patrolled" and "activity" notes into flowing sentences>

Findings:
- <finding 1, keep any SR/TN/TK reference numbers>
- <finding 2>
- (one bullet per finding, split run-on findings into separate bullets)

Remarks:
<clean prose paragraph from the remarks section>

End Time: <end time>

WORKED EXAMPLE
Raw input:
"""
**Date:* 04-07-2026
**Start Time of the Patrol:* 06:02hrs
**Patrol Type:* Initial Patrol
**Exact Location of Patrolling:* Firdaus Studio
**Description of the area patrolled:*
Conducted the initial patrol in the entire building, both (internal and external) areas checked all critical rooms, Offices, FACP, fire extinguishers, fire hose reel cabinets, amongst other areas and found everything in good condition except pending issues which are under follow-up.
**Activity:*
No activity is going on at the moment.
* Emrill staff came for AC temperature reading, left at 06:27
**Findings:*
*Main scoring door not properly fixed. Issue is still pending.
*UPS device battery replacement is still pending in the server room. TN 0633470.
*Soap dispenser is not working in the female washroom. TK 0012326.
**Remarks:*
Most of the above issues are pending since there are no available materials for rectification as per FM Management.
*End Time:* 06:55hrs
**Security Call Sign:* F1
"""

Correct output:
"""
Date: 04-07-2026
Security Call Sign: F1
Patrol Type: Initial Patrol
Start Time: 06:02hrs
Location: Firdaus Studio

Description of Activity / Finding(s):
Description -
Conducted the initial patrol throughout the entire building, covering both internal and external areas. All critical rooms, offices, FACP, fire extinguishers, and fire hose reel cabinets were inspected, and everything was found in good condition except for the pending issues listed below. No activity was ongoing at the time of patrol. Emrill staff attended for an AC temperature reading and departed at 06:27hrs.

Findings:
- Main scoring door not properly fixed, issue still pending.
- UPS device battery replacement still pending in the server room (TN-0633470).
- Soap dispenser not working in the female washroom (TK-0012326).

Remarks:
Most of the above issues remain pending as there are no available materials for rectification, as advised by FM Management.

End Time: 06:55hrs
"""

Now reformat this new raw input the same way:
"""
${raw}
"""`;
}

function buildContractorPrompt(raw){
  return `You are formatting Expo City Security contractor activity reports. You will be given a rough, informal raw note about a contractor/material collection activity. Rewrite it into a clean, consistent report using EXACTLY the structure and labels below. Fix typos, spelling, and grammar, and tidy up phone numbers/company names. Keep every factual detail (names, mobile numbers, VRN, company names, MEP reference) exactly as given — never invent information; if something is genuinely missing or blank in the raw text, write "Not specified" for that field rather than guessing. Output plain text only, no markdown symbols like ** or #, no HTML.

TARGET FORMAT:
Date: <date>
Location: <location>
Subject: <subject>

Description:
<clean prose paragraph describing the activity>

In-Charge Details:
Name: <name>
Mobile: <mobile>
Company: <company>

Driver Details:
Name: <name>
Mobile: <mobile>
VRN: <vrn>
Company: <company>

Regards

WORKED EXAMPLE
Raw input:
"""
Date: 04/07/26
Location: SUS basement zone 4 loading bay.
Subject: Material collection
Description: Be informed that staff from are shifting building waste materials from CRC taking them outside Expo under a valid MEP.
Incharge Details;
Name: Muhammad Aziz
Mobile: 0551473254
Company: Red leaf
Driver details;
Name: Waseem
Mobile: 0529182605
VRN: 21065
Company: Ejaz transportation
Regards
"""

Correct output:
"""
Date: 04-07-2026
Location: SUS Basement, Zone 4 – Loading Bay
Subject: Material Collection

Description:
Be informed that staff from Red Leaf are shifting building waste materials from CRC and taking them outside Expo under a valid MEP.

In-Charge Details:
Name: Muhammad Aziz
Mobile: 0551473254
Company: Red Leaf

Driver Details:
Name: Waseem
Mobile: 0529182605
VRN: 21065
Company: Ejaz Transportation

Regards
"""

Now reformat this new raw input the same way:
"""
${raw}
"""`;
}

// ── GENERATE ─────────────────────────────────────────────────────────
async function generateReport(){
  const raw = document.getElementById('rawInput').value.trim();
  if(!raw){ alert('Paste the raw report text first.'); return; }

  document.getElementById('outCard').style.display = 'none';
  document.getElementById('copiedFlag').style.display = 'none';
  document.getElementById('proc').style.display = 'block';
  document.getElementById('genBtn').disabled = true;

  const prompt = mode === 'security' ? buildSecurityPrompt(raw) : buildContractorPrompt(raw);

  try{
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: {
          temperature: 0.3,
          maxOutputTokens: 2048
        }
      })
    });

    if(!response.ok){
      const err = await response.json().catch(()=>({}));
      throw new Error('Worker error ' + response.status + ': ' + (err.error?.message || 'Unknown error'));
    }

    const data = await response.json();
    const text = (data.candidates?.[0]?.content?.parts?.[0]?.text || '').trim();

    document.getElementById('proc').style.display = 'none';
    document.getElementById('genBtn').disabled = false;

    if(!text){
      showError('Gemini returned an empty response. Try again.');
      return;
    }

    lastReportText = text;
    document.getElementById('outBox').textContent = text;
    document.getElementById('outCard').style.display = 'block';
    window.scrollTo({top: document.getElementById('outCard').offsetTop - 70, behavior:'smooth'});

  }catch(e){
    document.getElementById('proc').style.display = 'none';
    document.getElementById('genBtn').disabled = false;
    showError('Error: ' + e.message + '\n\nCheck your Cloudflare Worker is running correctly.');
  }
}

function showError(msg){
  document.getElementById('outBox').innerHTML = `<div class="errmsg">${msg.replace(/\n/g,'<br>')}</div>`;
  document.getElementById('outCard').style.display = 'block';
  window.scrollTo({top: document.getElementById('outCard').offsetTop - 70, behavior:'smooth'});
}

// ── COPY ─────────────────────────────────────────────────────────────
async function copyReport(){
  if(!lastReportText) return;
  try{
    await navigator.clipboard.writeText(lastReportText);
  }catch(e){
    // fallback for older webviews
    const ta = document.createElement('textarea');
    ta.value = lastReportText;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand('copy'); }catch(err){}
    document.body.removeChild(ta);
  }
  const flag = document.getElementById('copiedFlag');
  flag.style.display = 'block';
  setTimeout(()=>{ flag.style.display = 'none'; }, 2200);
}

function resetAll(){
  document.getElementById('outCard').style.display = 'none';
  document.getElementById('rawInput').value = '';
  lastReportText = '';
}
</script>
</body>
</html>
