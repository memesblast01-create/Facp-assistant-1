<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACP Assistant - Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #0a0e27;
  color: #fff;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.header h1 {
  font-size: 2em;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #25D366, #128C7E);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Login View */
.login-view {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.login-box {
  backdrop-filter: blur(15px);
  background: rgba(0, 0, 0, 0.7);
  padding: 40px;
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  width: 100%;
  max-width: 400px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

.login-box h2 {
  margin-bottom: 25px;
  text-align: center;
}

.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
  color: #aaa;
  font-size: 0.9em;
}

.form-group input {
  width: 100%;
  padding: 12px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
  border-radius: 8px;
  font-size: 1em;
  transition: all 0.3s ease;
}

.form-group input:focus {
  outline: none;
  border-color: rgba(37, 211, 102, 0.5);
  background: rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.2);
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 1em;
  margin-top: 10px;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
}

button:active {
  transform: translateY(0);
}

button.secondary {
  background: rgba(255, 255, 255, 0.1);
  color: #aaa;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

button.secondary:hover {
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
}

button.danger {
  background: rgba(255, 67, 54, 0.2);
  color: #FF4336;
  border: 1px solid rgba(255, 67, 54, 0.5);
}

button.danger:hover {
  background: rgba(255, 67, 54, 0.3);
  border-color: rgba(255, 67, 54, 0.7);
}

/* Admin Dashboard */
.admin-view {
  display: none;
}

.dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  flex-wrap: wrap;
  gap: 15px;
}

.user-info {
  background: rgba(37, 211, 102, 0.1);
  border: 1px solid rgba(37, 211, 102, 0.3);
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 0.95em;
}

.user-info strong {
  color: #25D366;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.tab-btn {
  padding: 12px 20px;
  background: transparent;
  color: #aaa;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.3s ease;
  margin: 0;
  width: auto;
}

.tab-btn.active {
  color: #25D366;
  border-bottom-color: #25D366;
}

.tab-btn:hover {
  color: #fff;
  transform: none;
  box-shadow: none;
}

.tab-content {
  display: none;
  animation: fadeIn 0.3s ease;
}

.tab-content.active {
  display: block;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Upload Section */
.upload-section {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 25px;
}

.upload-section h3 {
  margin-bottom: 20px;
  color: #25D366;
}

.file-input-wrapper {
  position: relative;
  margin-bottom: 15px;
}

.file-input-wrapper input[type="file"] {
  display: none;
}

.file-input-label {
  display: block;
  padding: 15px;
  background: rgba(37, 211, 102, 0.1);
  border: 2px dashed rgba(37, 211, 102, 0.5);
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  color: #aaa;
}

.file-input-label:hover {
  background: rgba(37, 211, 102, 0.15);
  border-color: rgba(37, 211, 102, 0.8);
  color: #25D366;
}

.file-name {
  margin-top: 10px;
  font-size: 0.9em;
  color: #aaa;
}

/* Data Table */
.table-wrapper {
  overflow-x: auto;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  margin-bottom: 25px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(255, 255, 255, 0.02);
}

thead {
  background: rgba(37, 211, 102, 0.1);
  border-bottom: 2px solid rgba(37, 211, 102, 0.3);
}

th {
  padding: 15px;
  text-align: left;
  font-weight: 600;
  color: #25D366;
}

td {
  padding: 12px 15px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

tr:hover {
  background: rgba(37, 211, 102, 0.05);
}

.action-buttons {
  display: flex;
  gap: 8px;
}

.btn-small {
  padding: 6px 12px;
  font-size: 0.85em;
  width: auto;
  margin: 0;
}

.btn-edit {
  background: rgba(33, 150, 243, 0.2);
  color: #2196F3;
  border: 1px solid rgba(33, 150, 243, 0.5);
}

.btn-edit:hover {
  background: rgba(33, 150, 243, 0.3);
}

.btn-delete {
  background: rgba(255, 67, 54, 0.2);
  color: #FF4336;
  border: 1px solid rgba(255, 67, 54, 0.5);
}

.btn-delete:hover {
  background: rgba(255, 67, 54, 0.3);
}

/* Admin Management */
.admin-form {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 25px;
}

.admin-form h3 {
  margin-bottom: 20px;
  color: #25D366;
}

.form-row {
  display: flex;
  gap: 15px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.form-row input,
.form-row select {
  flex: 1;
  min-width: 200px;
  padding: 12px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
  border-radius: 8px;
  font-size: 1em;
}

.form-row select {
  cursor: pointer;
}

.form-row input:focus,
.form-row select:focus {
  outline: none;
  border-color: rgba(37, 211, 102, 0.5);
  background: rgba(255, 255, 255, 0.1);
}

.form-row button {
  min-width: 150px;
}

/* Messages */
.message {
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 8px;
  text-align: center;
  font-weight: 500;
  animation: slideIn 0.3s ease;
}

.message.success {
  background: rgba(37, 211, 102, 0.2);
  color: #25D366;
  border: 1px solid rgba(37, 211, 102, 0.5);
}

.message.error {
  background: rgba(255, 67, 54, 0.2);
  color: #FF4336;
  border: 1px solid rgba(255, 67, 54, 0.5);
}

.message.info {
  background: rgba(33, 150, 243, 0.2);
  color: #2196F3;
  border: 1px solid rgba(33, 150, 243, 0.5);
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.no-data {
  text-align: center;
  padding: 40px;
  color: #aaa;
  font-style: italic;
}

@media (max-width: 768px) {
  .dashboard-header {
    flex-direction: column;
    align-items: flex-start;
  }

  .tabs {
    flex-direction: column;
  }

  .tab-btn {
    width: 100%;
    border-bottom: none;
    border-left: 3px solid transparent;
    padding-left: 15px;
  }

  .tab-btn.active {
    border-bottom: none;
    border-left-color: #25D366;
  }

  .form-row {
    flex-direction: column;
  }

  .form-row input,
  .form-row select,
  .form-row button {
    min-width: auto;
    width: 100%;
  }

  table {
    font-size: 0.9em;
  }

  th, td {
    padding: 10px;
  }
}
</style>
</head>

<body>

<div class="container">
  <!-- Login View -->
  <div id="loginView" class="login-view">
    <div class="login-box">
      <h2>Admin Login</h2>
      <div id="loginMessage"></div>
      <div class="form-group">
        <label>Email</label>
        <input id="loginEmail" type="email" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="loginPassword" type="password" placeholder="Enter your password">
      </div>
      <button onclick="handleLogin()">LOGIN</button>
      <p style="text-align: center; margin-top: 20px; color: #aaa; font-size: 0.9em;">
        <a href="index.html" style="color: #25D366; text-decoration: none;">← Back to Search</a>
      </p>
    </div>
  </div>

  <!-- Admin Dashboard View -->
  <div id="adminView" class="admin-view">
    <div class="header">
      <h1>🔐 Admin Dashboard</h1>
    </div>

    <div class="dashboard-header">
      <div class="user-info">
        <strong>User:</strong> <span id="userEmail"></span><br>
        <strong>Role:</strong> <span id="userRole"></span>
      </div>
      <button class="secondary" onclick="handleLogout()">Logout</button>
    </div>

    <div id="dashboardMessage"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('upload')">Upload Data</button>
      <button class="tab-btn" onclick="switchTab('view')">View Data</button>
      <button class="tab-btn" id="adminTabBtn" onclick="switchTab('admin')" style="display:none;">Manage Admins</button>
    </div>

    <!-- Upload Tab -->
    <div id="uploadTab" class="tab-content active">
      <div class="upload-section">
        <h3>📤 Upload Building Data</h3>
        <p style="color: #aaa; margin-bottom: 20px;">Upload CSV or Excel files with building information. Columns will be auto-detected.</p>
        
        <div class="file-input-wrapper">
          <input id="fileInput" type="file" accept=".csv,.xlsx" onchange="handleFileSelect()">
          <label for="fileInput" class="file-input-label">
            <div>📁 Click to select CSV or Excel file</div>
            <div id="fileName" class="file-name"></div>
          </label>
        </div>

        <button onclick="handleFileUpload()">Upload File</button>
      </div>
    </div>

    <!-- View Data Tab -->
    <div id="viewTab" class="tab-content">
      <div style="margin-bottom: 20px;">
        <button onclick="loadBuildingsTable()">Refresh Data</button>
      </div>
      <div class="table-wrapper">
        <table id="dataTable">
          <thead>
            <tr id="tableHeader"></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="noDataMsg" class="no-data" style="display:none;">No data available</div>
    </div>

    <!-- Admin Management Tab -->
    <div id="adminTab" class="tab-content">
      <div class="admin-form">
        <h3>👥 Create New Admin</h3>
        <div class="form-row">
          <input id="newAdminEmail" type="email" placeholder="Admin email">
          <select id="adminRole">
            <option value="subadmin">Sub-Admin (Can only add data)</option>
            <option value="owner">Owner (Full access)</option>
          </select>
          <button onclick="handleCreateAdmin()">Create Admin</button>
        </div>
      </div>

      <h3 style="margin-top: 30px; margin-bottom: 20px;">Existing Admins</h3>
      <div class="table-wrapper">
        <table id="adminsTable">
          <thead>
            <tr>
              <th>Email</th>
              <th>Role</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="adminsTableBody"></tbody>
        </table>
      </div>
      <div id="noAdminsMsg" class="no-data" style="display:none;">No admins found</div>
    </div>
  </div>
</div>

<script>
// Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser = null;
let currentUserRole = null;
let selectedFile = null;
let buildingsData = [];

// Initialize
window.addEventListener("load", () => {
  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      checkUserRole();
    } else {
      showLoginView();
    }
  });
});

// Check user role
async function checkUserRole() {
  try {
    const userDoc = await db.collection("users").doc(currentUser.uid).get();
    if (userDoc.exists) {
      currentUserRole = userDoc.data().role;
      showAdminView();
    } else {
      // User not found in users collection
      showMessage("User not found in system. Contact administrator.", "error", "loginMessage");
      auth.signOut();
      showLoginView();
    }
  } catch (error) {
    console.error("Error checking role:", error);
    showMessage("Error: " + error.message, "error", "loginMessage");
  }
}

// Login
async function handleLogin() {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value.trim();

  if (!email || !password) {
    showMessage("Please enter email and password", "error", "loginMessage");
    return;
  }

  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (error) {
    showMessage("Login failed: " + error.message, "error", "loginMessage");
  }
}

// Logout
function handleLogout() {
  auth.signOut().then(() => {
    currentUser = null;
    currentUserRole = null;
    showLoginView();
  });
}

// Show login view
function showLoginView() {
  document.getElementById("loginView").style.display = "flex";
  document.getElementById("adminView").style.display = "none";
}

// Show admin view
function showAdminView() {
  document.getElementById("loginView").style.display = "none";
  document.getElementById("adminView").style.display = "block";
  
  document.getElementById("userEmail").textContent = currentUser.email;
  document.getElementById("userRole").textContent = currentUserRole.toUpperCase();

  // Show admin tab only for owners
  if (currentUserRole === "owner") {
    document.getElementById("adminTabBtn").style.display = "block";
  }

  loadBuildingsTable();
  loadAdminsList();
}

// Switch tabs
function switchTab(tabName) {
  // Hide all tabs
  document.querySelectorAll(".tab-content").forEach(tab => {
    tab.classList.remove("active");
  });
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  // Show selected tab
  document.getElementById(tabName + "Tab").classList.add("active");
  event.target.classList.add("active");
}

// File selection
function handleFileSelect() {
  selectedFile = document.getElementById("fileInput").files[0];
  if (selectedFile) {
    document.getElementById("fileName").textContent = "Selected: " + selectedFile.name;
  }
}

// Upload file
async function handleFileUpload() {
  if (!selectedFile) {
    showMessage("Please select a file", "error", "dashboardMessage");
    return;
  }

  if (currentUserRole === "subadmin") {
    showMessage("Sub-admins can only add data, not upload files", "error", "dashboardMessage");
    return;
  }

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      let rows = [];

      if (selectedFile.name.endsWith(".xlsx")) {
        const wb = XLSX.read(e.target.result, { type: "binary" });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
      } else {
        rows = e.target.result.split("\n").map(r => r.split(","));
      }

      let uploadedCount = 0;
      for (let row of rows) {
        if (!row || row.length < 2) continue;

        // Remove empty cells
        row = row.filter(cell => cell && cell.toString().trim() !== "");
        if (row.length === 0) continue;

        // Create flexible object
        const obj = {};
        const keys = ["Building_Code", "Building_Name", "Zone_or_Details"];
        
        row.forEach((val, idx) => {
          if (idx < keys.length) {
            obj[keys[idx]] = val.toString().trim();
          } else {
            obj["Field_" + (idx + 1)] = val.toString().trim();
          }
        });

        await db.collection("buildings").add(obj);
        uploadedCount++;
      }

      showMessage("Successfully uploaded " + uploadedCount + " records!", "success", "dashboardMessage");
      document.getElementById("fileInput").value = "";
      document.getElementById("fileName").textContent = "";
      selectedFile = null;
      loadBuildingsTable();
    } catch (error) {
      showMessage("Upload error: " + error.message, "error", "dashboardMessage");
    }
  };

  if (selectedFile.name.endsWith(".xlsx")) {
    reader.readAsBinaryString(selectedFile);
  } else {
    reader.readAsText(selectedFile);
  }
}

// Load buildings table
async function loadBuildingsTable() {
  try {
    const snapshot = await db.collection("buildings").get();
    buildingsData = [];
    const headerSet = new Set();

    snapshot.forEach(doc => {
      const data = doc.data();
      data.id = doc.id;
      buildingsData.push(data);
      Object.keys(data).forEach(key => {
        if (key !== "id") headerSet.add(key);
      });
    });

    if (buildingsData.length === 0) {
      document.getElementById("dataTable").style.display = "none";
      document.getElementById("noDataMsg").style.display = "block";
      return;
    }

    document.getElementById("dataTable").style.display = "table";
    document.getElementById("noDataMsg").style.display = "none";

    // Build header
    const headers = Array.from(headerSet);
    let headerHtml = "";
    headers.forEach(h => {
      headerHtml += "<th>" + h + "</th>";
    });
    headerHtml += "<th>Actions</th>";
    document.getElementById("tableHeader").innerHTML = headerHtml;

    // Build rows
    let rowsHtml = "";
    buildingsData.forEach(item => {
      rowsHtml += "<tr>";
      headers.forEach(h => {
        rowsHtml += "<td>" + (item[h] || "") + "</td>";
      });
      rowsHtml += `<td class="action-buttons">
        <button class="btn-small btn-edit" onclick="editRecord('${item.id}')">Edit</button>
        ${currentUserRole === "owner" ? `<button class="btn-small btn-delete" onclick="deleteRecord('${item.id}')">Delete</button>` : ""}
      </td></tr>`;
    });
    document.getElementById("tableBody").innerHTML = rowsHtml;
  } catch (error) {
    showMessage("Error loading data: " + error.message, "error", "dashboardMessage");
  }
}

// Edit record
function editRecord(id) {
  const record = buildingsData.find(r => r.id === id);
  if (!record) return;

  const newName = prompt("Edit Building Name:", record.Building_Name || "");
  if (newName === null) return;

  db.collection("buildings").doc(id).update({
    Building_Name: newName
  }).then(() => {
    showMessage("Record updated successfully!", "success", "dashboardMessage");
    loadBuildingsTable();
  }).catch(error => {
    showMessage("Error: " + error.message, "error", "dashboardMessage");
  });
}

// Delete record
function deleteRecord(id) {
  if (currentUserRole !== "owner") {
    showMessage("Only owners can delete records", "error", "dashboardMessage");
    return;
  }

  if (!confirm("Are you sure you want to delete this record?")) return;

  db.collection("buildings").doc(id).delete().then(() => {
    showMessage("Record deleted successfully!", "success", "dashboardMessage");
    loadBuildingsTable();
  }).catch(error => {
    showMessage("Error: " + error.message, "error", "dashboardMessage");
  });
}

// Create admin
async function handleCreateAdmin() {
  if (currentUserRole !== "owner") {
    showMessage("Only owners can create admins", "error", "dashboardMessage");
    return;
  }

  const email = document.getElementById("newAdminEmail").value.trim();
  const role = document.getElementById("adminRole").value;

  if (!email) {
    showMessage("Please enter an email", "error", "dashboardMessage");
    return;
  }

  try {
    // Create user in auth
    const userCred = await auth.createUserWithEmailAndPassword(email, "TempPassword123!");
    
    // Store user role
    await db.collection("users").doc(userCred.user.uid).set({
      email: email,
      role: role
    });

    showMessage("Admin created successfully! Temporary password: TempPassword123!", "success", "dashboardMessage");
    document.getElementById("newAdminEmail").value = "";
    loadAdminsList();
  } catch (error) {
    showMessage("Error: " + error.message, "error", "dashboardMessage");
  }
}

// Load admins list
async function loadAdminsList() {
  try {
    const snapshot = await db.collection("users").get();
    const admins = [];

    snapshot.forEach(doc => {
      admins.push({ id: doc.id, ...doc.data() });
    });

    if (admins.length === 0) {
      document.getElementById("adminsTable").style.display = "none";
      document.getElementById("noAdminsMsg").style.display = "block";
      return;
    }

    document.getElementById("adminsTable").style.display = "table";
    document.getElementById("noAdminsMsg").style.display = "none";

    let rowsHtml = "";
    admins.forEach(admin => {
      rowsHtml += `<tr>
        <td>${admin.email}</td>
        <td>${admin.role.toUpperCase()}</td>
        <td class="action-buttons">
          ${currentUserRole === "owner" ? `<button class="btn-small btn-delete" onclick="deleteAdmin('${admin.id}')">Remove</button>` : "N/A"}
        </td>
      </tr>`;
    });
    document.getElementById("adminsTableBody").innerHTML = rowsHtml;
  } catch (error) {
    console.error("Error loading admins:", error);
  }
}

// Delete admin
function deleteAdmin(id) {
  if (currentUserRole !== "owner") {
    showMessage("Only owners can remove admins", "error", "dashboardMessage");
    return;
  }

  if (!confirm("Are you sure you want to remove this admin?")) return;

  db.collection("users").doc(id).delete().then(() => {
    showMessage("Admin removed successfully!", "success", "dashboardMessage");
    loadAdminsList();
  }).catch(error => {
    showMessage("Error: " + error.message, "error", "dashboardMessage");
  });
}

// Show message
function showMessage(text, type = "success", elementId = "dashboardMessage") {
  const msgDiv = document.getElementById(elementId);
  msgDiv.textContent = text;
  msgDiv.className = "message " + type;
  msgDiv.style.display = "block";

  setTimeout(() => {
    msgDiv.style.display = "none";
  }, 5000);
}
</script>

</body>
</html>
