<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:url('background.jpg') center/cover fixed;
color:white;
}
.overlay{
background:rgba(0,0,0,0.8);
min-height:100vh;
padding:20px;
}
input,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}
button{background:#25D366;color:white;}
.row{
background:white;
color:black;
margin-top:5px;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>
<div class="overlay">

<h2>ADMIN PANEL</h2>

<div id="loginBox">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">

<input type="file" id="file">
<button onclick="upload()">Upload CSV/Excel</button>

<input id="newAdmin" placeholder="Add admin email">
<button onclick="addAdmin()">Add Admin</button>

<div id="list"></div>

</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let role = "uploader";

async function login(){
 await auth.signInWithEmailAndPassword(email.value, pass.value);
 document.getElementById("loginBox").style.display="none";
 document.getElementById("panel").style.display="block";
 load();
}

async function upload(){
 const file = document.getElementById("file").files[0];

 const reader = new FileReader();
 reader.onload = async (e)=>{
 const data = new Uint8Array(e.target.result);
 const wb = XLSX.read(data,{type:"array"});
 const sheet = wb.Sheets[wb.SheetNames[0]];
 const json = XLSX.utils.sheet_to_json(sheet,{header:1});

 for(let row of json){
 if(!row.length) continue;

 await db.collection("buildings").add({
 raw: row.join(" ")
 });
 }

 alert("Uploaded");
 load();
 };

 reader.readAsArrayBuffer(file);
}

async function load(){
 const snap = await db.collection("buildings").get();
 const list = document.getElementById("list");
 list.innerHTML="";

 snap.forEach(d=>{
 list.innerHTML += `
 <div class="row">
 ${d.data().raw}
 </div>`;
 });
}

async function addAdmin(){
 await db.collection("admins").doc(newAdmin.value).set({
 email: newAdmin.value,
 role: "uploader"
 });

 alert("Admin added (uploader only)");
}
</script>

</body>
</html>
