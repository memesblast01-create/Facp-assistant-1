<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN PANEL</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("background.jpg") center/cover fixed;
}
.overlay{
  min-height:100vh;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  padding:20px;
}
.panel{
  width:100%;
  max-width:520px;
  background:white;
  padding:20px;
  border-radius:15px;
}
input,button,select{
  width:100%;
  padding:12px;
  margin-top:10px;
}
button{
  background:#25D366;
  color:white;
  border:none;
  cursor:pointer;
}
.red{
  background:red !important;
}
.item{
  padding:10px;
  border-bottom:1px solid #ddd;
}
small{color:#555}
</style>
</head>

<body>
<div class="overlay">
<div class="panel">

<h3>ADMIN LOGIN</h3>

<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">LOGIN</button>

<hr>

<input type="file" id="file">
<button onclick="uploadFile()">UPLOAD CSV / EXCEL</button>

<input id="adminEmail" placeholder="new admin email">
<select id="roleSelect">
  <option value="admin">Admin</option>
  <option value="uploader">Uploader</option>
</select>
<button onclick="addAdmin()">ADD ADMIN</button>

<hr>

<h3>DATABASE</h3>
<div id="list"></div>

</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let role = "";

async function login(){
  const e = email.value;
  const p = pass.value;

  try{
    await auth.signInWithEmailAndPassword(e,p);

    const snap = await db.collection("users")
      .where("email","==",e)
      .get();

    snap.forEach(d=>{
      role = d.data().role;
    });

    alert("Logged in as: " + role);
    loadData();
  }catch(err){
    alert(err.message);
  }
}

async function uploadFile(){
  const file = document.getElementById("file").files[0];
  const reader = new FileReader();

  reader.onload = async function(e){

    let data = [];

    if(file.name.endsWith(".xlsx")){
      const wb = XLSX.read(e.target.result,{type:"binary"});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      data = XLSX.utils.sheet_to_json(sheet);
    } else {
      data = e.target.result.split("\n").map(l=>{
        const [c,n,z] = l.split(",");
        return {
          Building_Code:c?.trim(),
          Building_Name:n?.trim(),
          Zone_or_Details:z?.trim()
        };
      });
    }

    for(let d of data){
      if(d.Building_Code || d.Building_Name){
        await db.collection("buildings").add(d);
      }
    }

    alert("Upload complete");
    loadData();
  };

  if(file.name.endsWith(".xlsx")){
    reader.readAsBinaryString(file);
  } else {
    reader.readAsText(file);
  }
}

async function addAdmin(){
  if(role !== "owner"){
    return alert("Only owner can add admins");
  }

  await db.collection("users").add({
    email: adminEmail.value,
    role: roleSelect.value
  });

  alert("Admin added");
}

async function loadData(){
  const snap = await db.collection("buildings").get();
  const box = document.getElementById("list");
  box.innerHTML = "";

  snap.forEach(doc=>{
    const x = doc.data();

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <b>${x.Building_Code || "-"}</b><br>
      ${x.Building_Name || "-"}<br>
      <small>${x.Zone_or_Details || ""}</small><br>
      <button class="red" onclick="deleteItem('${doc.id}')">DELETE</button>
    `;

    box.appendChild(div);
  });
}

async function deleteItem(id){
  if(role !== "owner" && role !== "admin"){
    return alert("No permission");
  }

  await db.collection("buildings").doc(id).delete();

  alert("Deleted");
  loadData();
}
</script>

</body>
</html>
