<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACP Admin</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; width: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
  color: #333;
}

.container {
  max-width: 900px;
  margin: 0 auto;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 32px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  margin-bottom: 20px;
}

.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  flex-wrap: wrap;
  gap: 15px;
}

.title {
  font-size: 32px;
  font-weight: 700;
  color: #333;
}

.logout-btn {
  background: #ff6b6b;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
}

.logout-btn:hover {
  background: #ff5252;
}

.user-info {
  color: #666;
  font-size: 14px;
  margin-bottom: 20px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
  border-bottom: 2px solid #f0f0f0;
}

.tab-btn {
  background: none;
  border: none;
  padding: 12px 20px;
  font-size: 15px;
  font-weight: 600;
  color: #999;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}

.tab-btn.active {
  color: #667eea;
  border-bottom-color: #667eea;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-weight: 600;
  color: #333;
  margin-bottom: 8px;
  font-size: 14px;
}

.form-group input,
.form-group select {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.btn {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
  transition: transform 0.2s;
}

.btn:hover {
  transform: translateY(-2px);
}

.btn-danger {
  background: #ff6b6b;
}

.btn-danger:hover {
  background: #ff5252;
}

.btn-secondary {
  background: #f0f0f0;
  color: #333;
}

.btn-secondary:hover {
  background: #e0e0e0;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th {
  background: #f9f9f9;
  padding: 12px;
  text-align: left;
  font-weight: 600;
  color: #333;
  border-bottom: 2px solid #f0f0f0;
  font-size: 14px;
}

td {
  padding: 12px;
  border-bottom: 1px solid #f0f0f0;
  font-size: 14px;
}

tr:hover {
  background: #f9f9f9;
}

.action-btn {
  padding: 6px 12px;
  font-size: 12px;
  margin-right: 8px;
}

.hidden {
  display: none;
}

.message {
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 14px;
  font-weight: 500;
}

.message.success {
  background: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
}

.message.error {
  background: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
}

.no-data {
  text-align: center;
  padding: 40px 20px;
  color: #999;
}

@media (max-width: 768px) {
  .card {
    padding: 20px;
  }

  .header-bar {
    flex-direction: column;
    align-items: flex-start;
  }

  .title {
    font-size: 24px;
  }

  .tabs {
    flex-wrap: wrap;
  }

  table {
    font-size: 12px;
  }

  td, th {
    padding: 8px;
  }
}
</style>
</head>
<body>

<div class="container">
  <!-- LOGIN VIEW -->
  <div id="loginView" class="card" style="max-width: 400px; margin: 60px auto;">
    <h2 style="margin-bottom: 30px; text-align: center;">Admin Login</h2>
    <div id="loginMsg" class="message hidden"></div>
    
    <div class="form-group">
      <label>Email</label>
      <input id="email" type="email" placeholder="your@email.com">
    </div>
    
    <div class="form-group">
      <label>Password</label>
      <input id="pass" type="password" placeholder="••••••••">
    </div>
    
    <button class="btn" onclick="login()" style="width: 100%; margin-bottom: 10px;">Login</button>
    <button class="btn btn-secondary" onclick="location.href='index.html'" style="width: 100%;">Back to Search</button>
  </div>

  <!-- ADMIN VIEW -->
  <div id="adminView" class="hidden">
    <div class="card">
      <div class="header-bar">
        <div>
          <h2 class="title">Admin Panel</h2>
          <div class="user-info" id="userInfo"></div>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('data', this)">Data Management</button>
        <button class="tab-btn" id="adminTabBtn" onclick="switchTab('admins', this)">Manage Admins</button>
      </div>

      <!-- DATA TAB -->
      <div id="dataTab" class="tab-content active">
        <div class="form-group">
          <label>Upload CSV or Excel File</label>
          <input type="file" id="fileInput" accept=".csv,.xlsx">
        </div>
        <button class="btn" onclick="upload()">Upload Data</button>

        <div style="margin-top: 30px; display: flex; gap: 10px;">
          <button class="btn" onclick="loadTable()">Refresh</button>
          <button class="btn btn-danger" id="clearBtn" onclick="clearData()">Clear All</button>
        </div>

        <div style="overflow-x: auto; margin-top: 20px;">
          <table id="dataTable">
            <thead>
              <tr><th>Details</th><th>Action</th></tr>
            </thead>
            <tbody id="dataBody"></tbody>
          </table>
        </div>
      </div>

      <!-- ADMINS TAB -->
      <div id="adminsTab" class="tab-content">
        <div class="form-group">
          <label>Email</label>
          <input id="newAdminEmail" type="email" placeholder="admin@example.com">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input id="newAdminPass" type="password" placeholder="••••••••">
        </div>

        <div class="form-group">
          <label>Role</label>
          <select id="newAdminRole">
            <option value="subadmin">Sub-Admin (Add Only)</option>
            <option value="owner">Owner (Full Access)</option>
          </select>
        </div>

        <button class="btn" onclick="createAdmin()">Create Admin</button>

        <div style="margin-top: 40px;">
          <h3 style="margin-bottom: 20px;">Existing Admins</h3>
          <table id="adminsTable">
            <thead>
              <tr><th>Email</th><th>Role</th><th>Action</th></tr>
            </thead>
            <tbody id="adminsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

let db, auth;
let currentUserRole = 'owner';

try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  auth = firebase.auth();
} catch(e) { console.error(e); }

async function login() {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("pass").value.trim();
  
  if(!email || !pass) return showMsg("Enter email and password", "error", "loginMsg");

  try {
    await auth.signInWithEmailAndPassword(email, pass);
    
    try {
      const userDoc = await db.collection("users").where("email", "==", email).get();
      if(!userDoc.empty) {
        currentUserRole = userDoc.docs[0].data().role;
      }
    } catch(e) {
      currentUserRole = 'owner';
    }
    
    showAdmin(email);
  } catch(err) { 
    showMsg("Login Failed: " + err.message, "error", "loginMsg");
  }
}

function showAdmin(email) {
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("adminView").classList.remove("hidden");
  document.getElementById("userInfo").textContent = `Logged in as: ${email} (${currentUserRole.toUpperCase()})`;
  
  if(currentUserRole === 'subadmin') {
    document.getElementById("adminTabBtn").classList.add("hidden");
    document.getElementById("clearBtn").classList.add("hidden");
  }
  
  loadTable();
  loadAdmins();
}

function logout() {
  auth.signOut().then(() => location.reload());
}

function switchTab(tab, btn) {
  document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
  
  document.getElementById(tab + "Tab").classList.add("active");
  btn.classList.add("active");
}

async function upload() {
  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Select a file");

  const reader = new FileReader();
  reader.onload = async (e) => {
    let rows = [];
    try {
      if(file.name.endsWith("xlsx")) {
        const wb = XLSX.read(e.target.result, {type:"binary"});
        rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      } else {
        const lines = e.target.result.split("\n");
        const headers = lines[0].split(",").map(h => h.trim());
        for(let i=1; i<lines.length; i++) {
          if(!lines[i].trim()) continue;
          const values = lines[i].split(",").map(v => v.trim());
          const obj = {};
          headers.forEach((h, idx) => obj[h || "Field_"+idx] = values[idx] || "");
          rows.push(obj);
        }
      }

      const batch = db.batch();
      rows.forEach(row => {
        batch.set(db.collection("buildings").doc(), row);
      });
      await batch.commit();
      
      const snap = await db.collection("buildings").get();
      const fireData = [];
      snap.forEach(doc => fireData.push(doc.data()));
      localStorage.setItem("facp_data", JSON.stringify(fireData));
      
      alert("Uploaded " + rows.length + " records!");
      loadTable();
    } catch(err) { 
      alert("Error: " + err.message); 
    }
  };
  if(file.name.endsWith("xlsx")) reader.readAsBinaryString(file);
  else reader.readAsText(file);
}

async function loadTable() {
  const body = document.getElementById("dataBody");
  try {
    const snap = await db.collection("buildings").limit(50).get();
    let html = "";
    snap.forEach(doc => {
      const item = doc.data();
      const details = Object.entries(item).map(([k, v]) => `<strong>${k}:</strong> ${v}`).join(" | ");
      html += `<tr>
        <td>${details}</td>
        <td>${currentUserRole === 'owner' ? `<button class="btn btn-danger action-btn" onclick="deleteRecord('${doc.id}')">Delete</button>` : 'N/A'}</td>
      </tr>`;
    });
    body.innerHTML = html || "<tr><td colspan='2' class='no-data'>No records</td></tr>";
  } catch(e) {
    body.innerHTML = "<tr><td colspan='2' class='no-data'>Error loading data</td></tr>";
  }
}

async function deleteRecord(id) {
  if(!confirm("Delete this record?")) return;
  try {
    await db.collection("buildings").doc(id).delete();
    const snap = await db.collection("buildings").get();
    const fireData = [];
    snap.forEach(doc => fireData.push(doc.data()));
    localStorage.setItem("facp_data", JSON.stringify(fireData));
    loadTable();
  } catch(e) { alert("Error: " + e.message); }
}

async function clearData() {
  if(!confirm("Clear ALL data?")) return;
  try {
    const snap = await db.collection("buildings").get();
    const batch = db.batch();
    snap.forEach(doc => batch.delete(doc.ref));
    await batch.commit();
    localStorage.removeItem("facp_data");
    loadTable();
  } catch(e) { alert("Error: " + e.message); }
}

async function createAdmin() {
  if(currentUserRole !== 'owner') return alert("Only Owners can create admins");
  
  const email = document.getElementById("newAdminEmail").value.trim();
  const pass = document.getElementById("newAdminPass").value.trim();
  const role = document.getElementById("newAdminRole").value;
  
  if(!email || !pass) return alert("Enter email and password");
  if(pass.length < 6) return alert("Password must be at least 6 characters");

  try {
    // Create user in Auth
    const userCred = await auth.createUserWithEmailAndPassword(email, pass);
    
    // Add to users collection
    await db.collection("users").doc(userCred.user.uid).set({ email, role });
    
    alert("Admin created successfully!");
    document.getElementById("newAdminEmail").value = "";
    document.getElementById("newAdminPass").value = "";
    loadAdmins();
  } catch(e) { 
    alert("Error: " + e.message); 
  }
}

async function loadAdmins() {
  const body = document.getElementById("adminsBody");
  try {
    const snap = await db.collection("users").get();
    let html = "";
    snap.forEach(doc => {
      const u = doc.data();
      html += `<tr>
        <td>${u.email}</td>
        <td>${u.role}</td>
        <td>${currentUserRole === 'owner' ? `<button class="btn btn-danger action-btn" onclick="deleteAdmin('${doc.id}')">Remove</button>` : 'N/A'}</td>
      </tr>`;
    });
    body.innerHTML = html || "<tr><td colspan='3' class='no-data'>No admins</td></tr>";
  } catch(e) {
    body.innerHTML = "<tr><td colspan='3' class='no-data'>Error loading admins</td></tr>";
  }
}

async function deleteAdmin(id) {
  if(!confirm("Remove this admin?")) return;
  try {
    await db.collection("users").doc(id).delete();
    loadAdmins();
  } catch(e) { alert("Error: " + e.message); }
}

function showMsg(text, type, id) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = "message " + type;
  el.classList.remove("hidden");
  setTimeout(() => el.classList.add("hidden"), 4000);
}
</script>
</body>
</html>
