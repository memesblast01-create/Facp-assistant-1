<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:url('background.jpg') center/cover fixed;
    color:white;
}
.overlay {
    background:rgba(0,0,0,0.8);
    min-height:100vh;
    padding:20px;
}
input,button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}
button { background:#25D366; color:white; }
.table { margin-top:20px; }
.row {
    background:white;
    color:black;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
}
</style>
</head>

<body>
<div class="overlay">

<h2>Admin Panel</h2>

<div id="login">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">

<input type="file" id="file">
<button onclick="uploadFile()">Upload File</button>

<h3>Data</h3>
<div id="list"></div>

</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

async function login(){
    await auth.signInWithEmailAndPassword(
        email.value, pass.value
    );
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
    loadData();
}

async function uploadFile(){
    const file = document.getElementById("file").files[0];
    const reader = new FileReader();

    reader.onload = async (e)=>{
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data,{type:"array"});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        for(const row of json){
            await db.collection("buildings").add({
                Building_Code: row.Building_Code || row.Code || "",
                Building_Name: row.Building_Name || row.Name || "",
                Zone_or_Details: row.Zone || ""
            });
        }

        alert("Uploaded");
        loadData();
    };

    reader.readAsArrayBuffer(file);
}

async function loadData(){
    const snap = await db.collection("buildings").get();
    const list = document.getElementById("list");
    list.innerHTML = "";

    snap.forEach(doc=>{
        const d = doc.data();
        list.innerHTML += `
        <div class="row">
        ${d.Building_Name} (${d.Building_Code})
        <button onclick="del('${doc.id}')">Delete</button>
        </div>`;
    });
}

async function del(id){
    await db.collection("buildings").doc(id).delete();
    loadData();
}
</script>
</body>
</html>
