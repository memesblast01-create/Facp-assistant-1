<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

.center{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

.box{
  width:90%;
  max-width:400px;
}

input,button,textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
}

button{
  background:#25D366;
  border:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="login" class="center">
  <div class="box">
    <h2>ADMIN LOGIN</h2>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">LOGIN</button>
  </div>
</div>

<div id="panel" style="display:none" class="center">
  <div class="box">
    <h2>ADMIN DASHBOARD</h2>

    <input type="file" id="file">
    <button onclick="upload()">UPLOAD FILE</button>

    <input id="newAdmin" placeholder="Add Sub Admin Email">
    <button onclick="addAdmin()">ADD ADMIN</button>

    <button onclick="logout()" style="background:red">LOGOUT</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

function login(){
  auth.signInWithEmailAndPassword(email.value, pass.value)
  .then(()=>{
    login.style.display="none";
    panel.style.display="flex";
  })
  .catch(e=>alert(e.message));
}

function detect(row){
  let v = Object.values(row);
  return {
    Building_Code: v.find(x=>/\d/.test(x))||"",
    Building_Name: v.find(x=>typeof x==="string" && !/\d/.test(x))||"",
    Zone_or_Details: v[2]||""
  };
}

function upload(){
  let file = document.getElementById("file").files[0];
  let reader = new FileReader();

  reader.onload = async e=>{
    let rows;

    if(file.name.endsWith("xlsx")){
      let wb = XLSX.read(e.target.result,{type:"binary"});
      let sheet = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(sheet,{header:1});
    } else {
      rows = e.target.result.split("\n").map(r=>r.split(","));
    }

    for(let r of rows){
      if(!r || r.length<2) continue;

      let obj = detect(r);
      await db.collection("buildings").add(obj);
    }

    alert("UPLOADED");
  };

  if(file.name.endsWith("xlsx"))
    reader.readAsBinaryString(file);
  else
    reader.readAsText(file);
}

function addAdmin(){
  db.collection("admins").add({
    email:newAdmin.value,
    role:"subadmin"
  });
  alert("Admin added");
}

function logout(){
  auth.signOut().then(()=>location.reload());
}
</script>

</body>
</html>
