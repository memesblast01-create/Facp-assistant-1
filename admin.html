<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }
section { margin:20px 0; padding:10px; border:1px solid #ccc; }
</style>
</head>

<body>

<h2>ADMIN LOGIN</h2>

<div id="loginBox">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>
</div>

<div id="panel" style="display:none">

<h3>UPLOAD CSV / EXCEL</h3>
<input type="file" id="fileInput">
<button onclick="upload()">UPLOAD</button>

<h3>ADD SUB ADMIN</h3>
<input id="newAdmin" placeholder="Email">
<button onclick="addAdmin()">MAKE ADMIN</button>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

function login(){
  auth.signInWithEmailAndPassword(
    email.value, pass.value
  ).then(()=>{
    loginBox.style.display="none";
    panel.style.display="block";
  }).catch(e=>alert(e.message));
}

function detect(row){
  let values = Object.values(row);

  return {
    Building_Code: values.find(v=>/\d/.test(v)) || "",
    Building_Name: values.find(v=>typeof v==="string" && !/\d/.test(v)) || "",
    Zone_or_Details: values[2] || ""
  };
}

function upload(){
  let file = fileInput.files[0];
  let reader = new FileReader();

  reader.onload = async function(e){
    let data;

    if(file.name.endsWith(".xlsx")){
      let wb = XLSX.read(e.target.result, {type:"binary"});
      let sheet = wb.Sheets[wb.SheetNames[0]];
      data = XLSX.utils.sheet_to_json(sheet, {header:1});
    } else {
      data = e.target.result.split("\n").map(r=>r.split(","));
    }

    let batch = db.batch();

    data.forEach(r=>{
      if(!r || r.length < 2) return;

      let obj = detect(r);

      let ref = db.collection("buildings").doc();
      batch.set(ref, obj);
    });

    await batch.commit();
    alert("Uploaded");
  };

  if(file.name.endsWith(".xlsx"))
    reader.readAsBinaryString(file);
  else
    reader.readAsText(file);
}

function addAdmin(){
  db.collection("admins").add({
    email: newAdmin.value,
    role: "subadmin"
  });
  alert("Admin added");
}
</script>

</body>
</html>
