<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACP Admin - Manus Mode</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; background: #0a0e27; color: white; padding: 20px; }
.box { max-width: 500px; margin: 50px auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid #25D366; }
input, button, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; }
button { background: #25D366; color: black; font-weight: bold; cursor: pointer; }
.hidden { display: none; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { padding: 10px; border: 1px solid #333; text-align: left; }
.status { text-align: center; margin-bottom: 10px; font-size: 0.8em; color: #25D366; }
</style>
</head>
<body>

<div id="loginView" class="box">
  <h2>Admin Login</h2>
  <p class="status">Manus Mode: Use any email/pass to login locally</p>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">LOGIN</button>
  <button onclick="location.href='index.html'" style="background:none; color:#aaa; margin-top:10px">Back to Search</button>
</div>

<div id="adminView" class="box hidden" style="max-width: 800px;">
  <h2>Admin Dashboard</h2>
  <p id="userDisplay" class="status"></p>
  
  <div style="margin-top:20px; border-top:1px solid #333; padding-top:20px">
    <h3>Upload Data (CSV/Excel)</h3>
    <input type="file" id="fileInput">
    <button onclick="upload()">Upload & Save</button>
  </div>

  <div style="margin-top:20px; border-top:1px solid #333; padding-top:20px">
    <h3>Current Data</h3>
    <button onclick="loadTable()" style="width:auto; padding:5px 15px">Refresh</button>
    <button onclick="clearData()" style="width:auto; padding:5px 15px; background:red; color:white">Clear All</button>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Code</th><th>Name</th><th>Zone</th><th>Action</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  
  <button onclick="logout()" style="background:#444; color:white; margin-top:30px">Logout</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhl-CLh7kaVklb22FAHTUPDaPKDaZm19M",
  authDomain: "facp-assistant.firebaseapp.com",
  projectId: "facp-assistant",
  storageBucket: "facp-assistant.firebasestorage.app",
  messagingSenderId: "771947694967",
  appId: "1:771947694967:web:4784fd12ab43dfec6c2f72"
};

let db = null;
let auth = null;
let isFirebase = false;

try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  auth = firebase.auth();
  isFirebase = true;
} catch(e) { console.log("Running in Local Mode"); }

async function login() {
  const e = document.getElementById("email").value;
  const p = document.getElementById("pass").value;

  if (isFirebase) {
    try {
      await auth.signInWithEmailAndPassword(e, p);
      showAdmin(e);
    } catch(err) {
      console.log("Firebase login failed, trying Local Mode...");
      if(e && p) showAdmin(e + " (Local)");
    }
  } else {
    if(e && p) showAdmin(e + " (Local)");
  }
}

function showAdmin(user) {
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("adminView").classList.remove("hidden");
  document.getElementById("userDisplay").textContent = "Logged in as: " + user;
  loadTable();
}

function logout() { location.reload(); }

function upload() {
  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Select a file");

  const reader = new FileReader();
  reader.onload = async (e) => {
    let rows = [];
    if(file.name.endsWith("xlsx")) {
      const wb = XLSX.read(e.target.result, {type:"binary"});
      rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
    } else {
      rows = e.target.result.split("\n").map(r => r.split(","));
    }

    const newData = [];
    for(let r of rows) {
      if(r.length < 2) continue;
      const obj = {
        Building_Code: String(r[0] || "").trim(),
        Building_Name: String(r[1] || "").trim(),
        Zone_or_Details: String(r[2] || "").trim()
      };
      newData.push(obj);
      if(isFirebase) db.collection("buildings").add(obj).catch(err => console.log(err));
    }

    // Save to Local Storage
    const existing = JSON.parse(localStorage.getItem("facp_data") || "[]");
    localStorage.setItem("facp_data", JSON.stringify([...existing, ...newData]));
    alert("Uploaded " + newData.length + " records!");
    loadTable();
  };

  if(file.name.endsWith("xlsx")) reader.readAsBinaryString(file);
  else reader.readAsText(file);
}

function loadTable() {
  const localData = JSON.parse(localStorage.getItem("facp_data") || "[]");
  const body = document.getElementById("tableBody");
  body.innerHTML = localData.map((item, idx) => `
    <tr>
      <td>${item.Building_Code}</td>
      <td>${item.Building_Name}</td>
      <td>${item.Zone_or_Details}</td>
      <td><button onclick="deleteItem(${idx})" style="background:red; color:white; padding:2px 5px; width:auto">Del</button></td>
    </tr>
  `).join("");
}

function deleteItem(idx) {
  const data = JSON.parse(localStorage.getItem("facp_data") || "[]");
  data.splice(idx, 1);
  localStorage.setItem("facp_data", JSON.stringify(data));
  loadTable();
}

function clearData() {
  if(confirm("Clear all local data?")) {
    localStorage.removeItem("facp_data");
    loadTable();
  }
}
</script>
</body>
</html>
